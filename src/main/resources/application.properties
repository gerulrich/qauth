app.version=${APP_VERSION:unknown}
quarkus.http.auth.form.http-only-cookie=false
quarkus.mongodb.connection-string = mongodb://localhost:27017
quarkus.mongodb.database = example-db
quarkus.banner.path=banner.txt
quarkus.http.cors=true
%dev.quarkus.http.cors.origins=/.*/
quarkus.jackson.property-naming-strategy=SNAKE_CASE

# -----------------------------------------------------------------------------
# JWT en PROD con propiedades nativas de Quarkus/SmallRye
# Opcion activa: HMAC + JWK (HS256)
# -----------------------------------------------------------------------------
mp.jwt.verify.issuer=quantumlab
jwt.expires-seconds=86400
%dev.smallrye.jwt.sign.key.location=secret.jwk
%dev.smallrye.jwt.verify.key.location=secret.jwk
%dev.smallrye.jwt.verify.key-format=JWK
%dev.smallrye.jwt.verify.algorithm=HS256
# -----------------------------------------------------------------------------
# Opcion alternativa (comentada): par publica/privada RSA (RS256)
# -----------------------------------------------------------------------------
#%dev.smallrye.jwt.verify.algorithm=RS256
#%dev.mp.jwt.verify.publickey.location=publicKey.pem
#%dev.smallrye.jwt.sign.key.location=privateKey.pem

# -----------------------------------------------------------------------------
# OpenAPI / Swagger UI
# -----------------------------------------------------------------------------
quarkus.smallrye-openapi.info-title=qauth API
quarkus.smallrye-openapi.info-version=1.0
quarkus.smallrye-openapi.info-description=Authentication service that issues signed JWT tokens
quarkus.smallrye-openapi.info-contact-name=Quantum Lab
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui

