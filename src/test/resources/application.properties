quarkus.http.test-port=0

# -------------------------------------------------------
# MongoDB: suppress background connection attempts
# (repos are mocked; the client is never actually used)
# -------------------------------------------------------
quarkus.mongodb.connection-string=mongodb://localhost:1
quarkus.mongodb.health.enabled=false

# -------------------------------------------------------
# In CI, override JWT_HMAC_SECRET via GitHub Secret.
# Default below is safe ONLY for local test runs.
# -------------------------------------------------------
jwt.hmac.secret=${JWT_HMAC_SECRET}
jwt.hmac.jwk={"kty":"oct","alg":"HS256","k":"${jwt.hmac.secret}"}

smallrye.jwt.sign.key=${jwt.hmac.jwk}
mp.jwt.verify.publickey=${jwt.hmac.jwk}
smallrye.jwt.verify.algorithm=HS256