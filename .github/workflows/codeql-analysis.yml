name: CodeQL Analysis (Java)

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-java:
    name: Analyze Java (Quarkus)
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: maven

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java

      - name: Build with Maven (force Java 21 release)
        run: mvn -B clean package -DskipTests -Dmaven.compiler.release=21

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          add-snippet: true
