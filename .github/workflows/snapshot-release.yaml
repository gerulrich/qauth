name: Release - Docker build and push (dont create GitHub release and tag)
on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version (M.m.p)
        required: true

permissions:
  contents: read

jobs:
  build:
    name: push docker image to docker hub
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Generate JWT HMAC secret
        run: |
          SECRET=$(dd if=/dev/urandom bs=1 count=64 2>/dev/null | base64 -w0 | tr '+/' '-_' | tr -d '=')
          echo "JWT_HMAC_SECRET=$SECRET" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          build-args: |
            APP_VERSION=${{ github.event.inputs.version }}
          platforms: linux/amd64,linux/arm64
          tags: |
            gerulrich/qauth:${{ github.event.inputs.version }}