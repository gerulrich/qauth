name: Test pull request

on:
  pull_request:
    branches: [ master ]

jobs:
  run-tests:
    runs-on: ubuntu-latest
    continue-on-error: false
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'graalvm'

      - name: Generate JWT HMAC secret
        run: |
          echo "JWT_HMAC_SECRET=$(dd if=/dev/urandom bs=1 count=64 2>/dev/null | base64 | tr '+/' '-_' | tr -d '=')" >> "$GITHUB_ENV"

      - name: Compile
        run: mvn clean --batch-mode compile

      - name: Test
        run: mvn --batch-mode test