name: Test pull request

on:
  pull_request:
    branches: [ master ]

jobs:
  run-tests:
    runs-on: ubuntu-latest
    continue-on-error: false
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'graalvm'

      - name: Generate JWT HMAC secret
        run: echo "JWT_HMAC_SECRET=$(python3 -c \"import secrets, base64; print(base64.urlsafe_b64encode(secrets.token_bytes(64)).decode().rstrip('='))\")" >> "$GITHUB_ENV"

      - name: Compile
        run: mvn clean --batch-mode compile

      - name: Test
        run: mvn --batch-mode test